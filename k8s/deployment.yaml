apiVersion: apps/v1
kind: Deployment
metadata:
  name: raizes-api
  namespace: raizes-api
  labels:
    app: raizes-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: raizes-api
  template:
    metadata:
      labels:
        app: raizes-api
    spec:
      initContainers:
        - name: init-data-dir
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /app/data && chmod 777 /app/data"]
          volumeMounts:
            - name: data
              mountPath: /app/data
      containers:
        - name: raizes-api
          image: uilsoneto/raizes-api:1.0.2
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:sqlite:/app/data/raizes.db?journal_mode=WAL"
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "update"
            - name: SPRING_SQL_INIT_MODE
              value: "always"
            - name: SPRING_JPA_DEFER_DATASOURCE_INITIALIZATION
              value: "true"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: raizes-secrets
                  key: jwt-secret
            - name: JWT_EXPIRATION_MS
              value: "3600000"
          volumeMounts:
            - name: data
              mountPath: /app/data
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: raizes-data-pvc
